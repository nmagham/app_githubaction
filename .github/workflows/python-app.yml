name: Python CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        
jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            #step 1
            - name: Check out code
              uses: actions/checkout@v2

            # step 2
            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.8'
            
            # step 3
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirement.txt
            
            # step 4
            - name: Run tests
              run: pytest
